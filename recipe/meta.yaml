{% set name = "anthropic" %}
{% set version = "0.103.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 69e5b9f63e4206a8845498426e7a27e87b56943cbd6fa9346fc7067fa4bc5e95

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  skip: true  # [py<39]

requirements:
  host:
    - pip
    - python
    # Upstream pins hatchling==1.26.3, but only 1.28+ is on pkgs/main works for py>313.
    - hatchling >=1.26.3
    - hatch-fancy-pypi-readme
  run:
    - python
    - httpx >=0.25.0,<1
    - pydantic >=1.9.0,<3
    - typing_extensions >=4.14,<5
    - anyio >=3.5.0,<5
    - distro >=1.7.0,<2
    - sniffio
    - jiter >=0.4.0,<1
    - docstring_parser >=0.15,<1
  run_constrained:
    # [aiohttp] extra
    - httpx_aiohttp >=0.1.9
    # [vertex] extra
    - google-auth >=2,<3
    - requests >=2.20.0,<3.0.0
    # [aws] / [bedrock] extras
    - boto3 >=1.28.57
    - botocore >=1.31.57
    # [mcp] extra
    - mcp >=1.0  # [py>=310]
    # [webhooks] extra
    - standardwebhooks >=1.0.1,<2

test:
  imports:
    - anthropic
    - anthropic.lib
    - anthropic.types
    - anthropic.resources
  commands:
    - pip check
  requires:
    - pip
  # Upstream's tests/conftest.py imports `http_snapshot` (snapshot-replay infra
  # added in 0.x.y), which is not packaged on pkgs/main; pytest cannot load
  # conftest at all. Rely on import + pip check coverage instead.

about:
  home: https://github.com/anthropics/anthropic-sdk-python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Library for accessing the anthropic API
  description: |
    The Anthropic Python SDK is a library for accessing the anthropic API.
    It provides a simple and intuitive interface for making requests to the API and handling responses.
    The SDK is designed to be easy to use and integrate into your existing Python projects.
  doc_url: https://console.anthropic.com/docs
  dev_url: https://github.com/anthropics/anthropic-sdk-python

extra:
  recipe-maintainers:
    - jan-janssen
    - jenan-anthropic
    - mikelambert
    - moritzwilksch
    - siboehm
    - x5a
