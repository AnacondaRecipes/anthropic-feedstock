{% set name = "anthropic" %}
{% set version = "0.100.0" %}

# Test modules ignored because their upstream dev-dep `respx` is unavailable on
# pkgs/main; *_bedrock*/*_vertex*/*_client* tests also require live AWS/GCP creds.
{% set ignore_tests = " --ignore=tests/api_resources" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/lib/streaming/test_messages.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/lib/test_bedrock.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/lib/test_bedrock_mantle.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/lib/test_vertex.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/test_client.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/test_files.py" %}
{% set ignore_tests = ignore_tests + " --ignore=tests/test_models.py" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 650dee9e023afb16395939ee4104bbc21f966b380210119fb91122c12099c79a

build:
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  number: 0
  skip: true  # [py<39]

requirements:
  host:
    - python
    - hatch-fancy-pypi-readme
    # Upstream pins hatchling==1.26.3, but only 1.28+ is on pkgs/main; >= works.
    - hatchling >=1.26.3
    - pip
  run:
    - python
    - httpx >=0.25.0,<1
    - pydantic >=1.9.0,<3
    - typing_extensions >=4.14,<5
    - anyio >=3.5.0,<5
    - distro >=1.7.0,<2
    - sniffio
    - jiter >=0.4.0,<1
    - docstring_parser >=0.15,<1
  run_constrained:
    # [vertex] extra
    - google-auth >=2,<3
    - requests >=2.20.0,<3.0.0
    # [aws] / [bedrock] extras
    - boto3 >=1.28.57
    - botocore >=1.31.57
    # [aiohttp] extra (aiohttp itself has no upstream version bound; omitted as a bare entry would be a solver no-op)
    - httpx_aiohttp >=0.1.9
    # [webhooks] extra
    - standardwebhooks >=1.0.1,<2
    # [mcp] extra
    - mcp >=1.0  # [py>=310]

test:
  source_files:
    - tests
    - pyproject.toml
  imports:
    - anthropic
    - anthropic.lib
    - anthropic.types
    - anthropic.resources
  commands:
    - pip check
    - pytest -v {{ ignore_tests }} --asyncio-mode=auto
  requires:
    - pip
    - pytest
    - pytest-asyncio

about:
  home: https://github.com/anthropics/anthropic-sdk-python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  summary: Library for accessing the anthropic API
  description: |
    The Anthropic Python SDK is a library for accessing the anthropic API.
    It provides a simple and intuitive interface for making requests to the API and handling responses.
    The SDK is designed to be easy to use and integrate into your existing Python projects.
  doc_url: https://console.anthropic.com/docs
  dev_url: https://github.com/anthropics/anthropic-sdk-python

extra:
  recipe-maintainers:
    - jan-janssen
    - jenan-anthropic
    - mikelambert
    - moritzwilksch
    - siboehm
    - x5a
