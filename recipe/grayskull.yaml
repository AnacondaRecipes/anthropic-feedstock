{% set name = "anthropic" %}
{% set version = "0.52.2" %}
package:
  name: {{ name|lower }}
  version: {{ version }}
source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/anthropic-{{ version }}.tar.gz
  sha256: 9047bc960e8513950579c9cb730c16a84af3fcb56341ad7dc730772f83757050
build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0
requirements:
  host:
    - python >=3.8
    - hatchling ==1.26.3
    - hatch-fancy-pypi-readme
    - pip
  run:
    - python >=3.8
    - httpx >=0.25.0,<1
    - pydantic >=1.9.0,<3
    - typing-extensions >=4.10,<5
    - anyio >=3.5.0,<5
    - distro >=1.7.0,<2
    - sniffio
    - jiter >=0.4.0,<1
test:
  imports:
    - anthropic
  commands:
    - pip check
  requires:
    - pip
about:
  summary: The official Python library for the anthropic API
  license: MIT
  license_file: LICENSE
extra:
  recipe-maintainers:
    - Arishamays1
